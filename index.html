<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Control de Tarjeta Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff6b35">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #0f1419; color: #e8eef5; font-family: 'Plus Jakarta Sans', sans-serif; }
    .card-surface { background: #1a2028; border: 1px solid rgba(255,255,255,0.06); }
    .accent-btn { background: #ff6b35; color: #0f1419; font-weight: 700; }
    .input-field { background: #1a2028; border: 1px solid rgba(255,255,255,0.1); color: #e8eef5; outline: none; }
    .input-field:focus { border-color: #ff6b35; }
    .installment-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; margin-top: 8px; }
    .installment-fill { height: 100%; background: #ff6b35; transition: width 0.4s ease; }
  </style>
</head>
<body class="p-4 pb-20">
  <header class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-[#ff6b35]">Mi Tarjeta</h1>
    <div class="flex gap-2">
       <button onclick="exportarDB()" class="p-2 card-surface rounded-lg text-xs">💾 Guardar .db</button>
       <button onclick="document.getElementById('file-input').click()" class="p-2 card-surface rounded-lg text-xs">📂 Abrir</button>
       <input type="file" id="file-input" class="hidden" accept=".db">
    </div>
  </header>

  <div id="status-db" class="text-[9px] text-center mb-2 opacity-40 uppercase tracking-widest">Iniciando...</div>

  <div class="card-surface rounded-2xl p-5 mb-6">
    <div class="flex justify-between items-center mb-6">
      <button onclick="cambiarMes(-1)" class="p-2 card-surface rounded-lg"><i data-lucide="chevron-left"></i></button>
      <h2 id="current-month-label" class="text-lg font-semibold capitalize text-center">---</h2>
      <button onclick="cambiarMes(1)" class="p-2 card-surface rounded-lg"><i data-lucide="chevron-right"></i></button>
    </div>
    
    <div class="grid grid-cols-1 gap-4">
      <div class="text-center bg-[#0f1419] p-4 rounded-xl border border-white/5">
        <div class="text-[10px] text-gray-400 mb-1 uppercase tracking-wider">Total a pagar este mes</div>
        <div id="month-total" class="text-4xl font-bold text-[#ff6b35]">$0.00</div>
      </div>
      
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-[#0f1419] p-3 rounded-xl border border-white/5 text-center">
          <div class="text-[9px] text-gray-400 mb-1 uppercase">Cuotas Activas</div>
          <div id="active-installments" class="text-xl font-bold text-white">0</div>
        </div>
        <div class="bg-[#0f1419] p-3 rounded-xl border border-white/5 text-center">
          <div class="text-[9px] text-gray-400 mb-1 uppercase">Deuda Restante</div>
          <div id="remaining-debt" class="text-xl font-bold text-white">$0.00</div>
        </div>
      </div>
    </div>
  </div>

  <form id="expense-form" class="card-surface rounded-2xl p-5 mb-6 space-y-4">
    <input id="desc" type="text" placeholder="Descripción (ej: Celular)" required class="input-field w-full p-3 rounded-xl">
    <div class="grid grid-cols-2 gap-4">
      <input id="amount" type="number" step="0.01" placeholder="Monto Total" required class="input-field p-3 rounded-xl">
      <input id="installments" type="number" placeholder="Cuotas" value="1" required class="input-field p-3 rounded-xl">
    </div>
    <div class="grid grid-cols-1 gap-4">
      <label class="text-[10px] text-gray-400 ml-1 -mb-3">MES DE INICIO</label>
      <input id="start-date" type="month" required class="input-field w-full p-3 rounded-xl">
    </div>
    <button type="submit" class="accent-btn w-full p-4 rounded-xl shadow-lg shadow-[#ff6b35]/20">Registrar Compra</button>
  </form>

  <div id="expenses-list" class="space-y-3"></div>

  <script>
    let db;
    let viewDate = new Date(); viewDate.setDate(1);

    async function iniciar() {
      const status = document.getElementById('status-db');
      try {
        const SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` });
        const saved = localStorage.getItem("db_tarjeta");
        if (saved) {
          db = new SQL.Database(new Uint8Array(JSON.parse(saved)));
          status.innerText = "● Base de Datos Conectada";
        } else {
          db = new SQL.Database();
          db.run("CREATE TABLE IF NOT EXISTS gastos (id INTEGER PRIMARY KEY, desc TEXT, monto REAL, cuotas INTEGER, inicio TEXT)");
          status.innerText = "● Nueva Base de Datos Creada";
        }
        render();
      } catch (e) {
        status.innerText = "❌ Error: " + e.message;
      }
    }

    function guardar() {
      const data = db.export();
      localStorage.setItem("db_tarjeta", JSON.stringify(Array.from(data)));
    }

    function render() {
      if (!db) return;
      const mKey = viewDate.getFullYear() + '-' + String(viewDate.getMonth() + 1).padStart(2, '0');
      const hoyKey = new Date().toISOString().substring(0, 7);
      
      document.getElementById('current-month-label').innerText = viewDate.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
      
      const res = db.exec("SELECT * FROM gastos");
      let totalMes = 0;
      let deudaTotal = 0;
      let cuotasActivas = 0;
      
      const list = document.getElementById('expenses-list');
      list.innerHTML = "";

      if (res.length > 0) {
        res[0].values.forEach(row => {
          const [id, d, m, c, ini] = row;
          const [y, mm] = ini.split('-').map(Number);
          const cuotaValor = m / c;
          let yaContadoComoActivo = false;

          for(let i=0; i<c; i++) {
            const fechaCuota = new Date(y, mm-1+i, 1);
            const k = fechaCuota.getFullYear() + '-' + String(fechaCuota.getMonth()+1).padStart(2, '0');
            
            // Si la cuota pertenece al mes que estamos viendo
            if (k === mKey) {
              totalMes += cuotaValor;
              if (c > 1) cuotasActivas++;
              
              const progress = ((i + 1) / c) * 100;
              list.innerHTML += `
                <div class="card-surface p-4 rounded-xl">
                  <div class="flex justify-between items-start">
                    <div>
                      <div class="font-bold text-sm">${d}</div>
                      <div class="text-[10px] text-gray-500">${c > 1 ? `Cuota ${i+1} de ${c}` : 'Pago Único'}</div>
                    </div>
                    <div class="text-right">
                      <div class="text-[#ff6b35] font-bold">$${cuotaValor.toFixed(2)}</div>
                      <button onclick="eliminar(${id})" class="text-[9px] text-red-500 font-bold mt-1 opacity-50 hover:opacity-100">ELIMINAR</button>
                    </div>
                  </div>
                  ${c > 1 ? `<div class="installment-bar"><div class="installment-fill" style="width:${progress}%"></div></div>` : ''}
                </div>`;
            }
            
            // Deuda restante (de hoy en adelante)
            if (k >= hoyKey) {
              deudaTotal += cuotaValor;
            }
          }
        });
      }
      
      document.getElementById('month-total').innerText = `$${totalMes.toFixed(2)}`;
      document.getElementById('active-installments').innerText = cuotasActivas;
      document.getElementById('remaining-debt').innerText = `$${deudaTotal.toFixed(2)}`;
      lucide.createIcons();
    }

    document.getElementById('expense-form').onsubmit = (e) => {
      e.preventDefault();
      db.run("INSERT INTO gastos (desc, monto, cuotas, inicio) VALUES (?,?,?,?)", 
        [document.getElementById('desc').value, document.getElementById('amount').value, document.getElementById('installments').value, document.getElementById('start-date').value]);
      guardar(); render(); e.target.reset();
      document.getElementById('start-date').value = new Date().toISOString().substring(0, 7);
    };

    function eliminar(id) {
      if(confirm("¿Eliminar este registro de todas las cuotas?")) {
        db.run("DELETE FROM gastos WHERE id = ?", [id]);
        guardar(); render();
      }
    }

    function cambiarMes(v) { viewDate.setMonth(viewDate.getMonth() + v); render(); }
    
    function exportarDB() {
      const blob = new Blob([db.export()], {type: "application/x-sqlite3"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `finanzas_${new Date().toISOString().slice(0,10)}.db`;
      a.click();
    }

    document.getElementById('file-input').onchange = (e) => {
      const reader = new FileReader();
      reader.onload = async function() {
        const SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` });
        db = new SQL.Database(new Uint8Array(reader.result));
        guardar(); render();
      };
      reader.readAsArrayBuffer(e.target.files[0]);
    };

    document.getElementById('start-date').value = new Date().toISOString().substring(0, 7);
    iniciar();
  </script>
</body>
</html>
