<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Control de Tarjeta Cloud</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    html, body { height: 100%; background: #0f1419; color: #e8eef5; font-family: 'Plus Jakarta Sans', sans-serif; }
    .font-display { font-family: 'Fraunces', serif; }
    .app-wrapper {
      min-height: 100%;
      background: radial-gradient(ellipse 80% 50% at 20% 0%, rgba(255, 107, 53, 0.15), transparent),
                  radial-gradient(ellipse 60% 50% at 100% 100%, rgba(255, 107, 53, 0.08), transparent), #0f1419;
    }
    .card-surface { background: #1a2028; border: 1px solid rgba(255,255,255,0.06); }
    .accent-btn { background: #ff6b35; color: #0f1419; font-weight: 600; transition: all 0.2s; }
    .accent-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .input-field { background: #0f1419; border: 1px solid rgba(255,255,255,0.1); color: #e8eef5; transition: border-color 0.2s; }
    .input-field:focus { border-color: #ff6b35; outline: none; }
    .month-nav-btn { background: #1a2028; border: 1px solid rgba(255,255,255,0.08); transition: all 0.2s; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin-custom { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="h-full">
  <div class="app-wrapper">
    <main class="max-w-6xl mx-auto px-4 py-8">
      
      <header class="mb-8 flex items-start justify-between gap-4 flex-wrap">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-[#ff6b35]">
              <i data-lucide="cloud" class="w-5 h-5 text-[#0f1419]"></i>
            </div>
            <span class="text-xs uppercase tracking-widest text-[#ff6b35]">Sincronización en la Nube</span>
          </div>
          <h1 class="font-display text-4xl font-bold text-white">Mi Tarjeta</h1>
        </div>
        <button onclick="fetchData()" class="text-xs px-4 py-2 rounded-lg card-surface flex items-center gap-2">
          <i data-lucide="refresh-cw" id="refresh-icon" class="w-3 h-3"></i> Actualizar
        </button>
      </header>

      <section class="card-surface rounded-2xl p-6 mb-6">
        <div class="flex items-center justify-between gap-4 flex-wrap mb-6">
          <div class="flex items-center gap-3">
            <button id="prev-month" class="month-nav-btn w-10 h-10 rounded-lg flex items-center justify-center"><i data-lucide="chevron-left"></i></button>
            <div>
              <div class="text-xs uppercase tracking-wider text-[#9ca9b8]">Mes Seleccionado</div>
              <div id="current-month-label" class="font-display text-2xl font-semibold capitalize text-[#ff6b35]">Cargando...</div>
            </div>
            <button id="next-month" class="month-nav-btn w-10 h-10 rounded-lg flex items-center justify-center"><i data-lucide="chevron-right"></i></button>
          </div>
          <button id="today-btn" class="text-xs px-3 py-2 rounded-lg month-nav-btn">Hoy</button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 text-center sm:text-left">
          <div class="rounded-xl p-4 bg-[#0f1419]">
            <div class="text-xs uppercase tracking-wider mb-1 text-[#9ca9b8]">Total del mes</div>
            <div id="month-total" class="font-display text-4xl font-bold text-[#ff6b35]">$0.00</div>
          </div>
          <div class="rounded-xl p-4 bg-[#0f1419]">
            <div class="text-xs uppercase tracking-wider mb-1 text-[#9ca9b8]">Cuotas activas</div>
            <div id="active-installments" class="font-display text-3xl font-bold">0</div>
          </div>
          <div class="rounded-xl p-4 bg-[#0f1419]">
            <div class="text-xs uppercase tracking-wider mb-1 text-[#9ca9b8]">Deuda restante</div>
            <div id="remaining-debt" class="font-display text-3xl font-bold text-gray-400">$0.00</div>
          </div>
        </div>
      </section>

      <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
        <section class="lg:col-span-2">
          <div class="card-surface rounded-2xl p-6">
            <h2 class="font-display text-xl font-semibold mb-4 flex items-center gap-2 text-[#ff6b35]">
              <i data-lucide="plus-circle" class="w-5 h-5"></i> Nuevo gasto
            </h2>
            <form id="expense-form" class="space-y-3">
              <input id="desc" type="text" required class="input-field w-full px-3 py-2.5 rounded-lg text-sm" placeholder="Descripción">
              <div class="grid grid-cols-2 gap-3">
                <input id="amount" type="number" step="0.01" required class="input-field w-full px-3 py-2.5 rounded-lg text-sm" placeholder="Monto Total">
                <input id="installments" type="number" min="1" value="1" required class="input-field w-full px-3 py-2.5 rounded-lg text-sm">
              </div>
              <div class="grid grid-cols-2 gap-3">
                <input id="start-date" type="month" required class="input-field w-full px-3 py-2.5 rounded-lg text-sm">
                <select id="category" class="input-field w-full px-3 py-2.5 rounded-lg text-sm">
                  <option>General</option><option>Hogar</option><option>Comida</option><option>Ocio</option>
                </select>
              </div>
              <button type="submit" id="submit-btn" class="accent-btn w-full py-3 rounded-lg text-sm mt-2">Guardar en la Nube</button>
            </form>
          </div>
        </section>

        <section class="lg:col-span-3">
          <div class="card-surface rounded-2xl p-6">
            <h2 class="font-display text-xl font-semibold mb-4 flex items-center gap-2">
              <i data-lucide="receipt" class="text-[#ff6b35]"></i> Movimientos del mes
            </h2>
            <div id="expenses-list" class="space-y-3">
               <div class="text-center py-10 opacity-30">Conectando con Google Sheets...</div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    // --- IMPORTANTE: PEGA AQUÍ TU URL ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwHCNpp3r4viy2xNtwR3VAQdVcu8PS5hbCSDLEP6ggvTY5xopJKRKURwtD0pjpXMg4q-Q/exec"; 

    let allExpenses = [];
    let viewDate = new Date(); viewDate.setDate(1);

    async function fetchData() {
      const icon = document.getElementById('refresh-icon');
      if(icon) icon.classList.add('animate-spin-custom');
      
      try {
        const response = await fetch(WEB_APP_URL);
        allExpenses = await response.json();
        render();
      } catch (err) {
        console.error("Error:", err);
      } finally {
        if(icon) icon.classList.remove('animate-spin-custom');
      }
    }

    async function eliminarGasto(id) {
      if(!confirm("¿Estás seguro?")) return;
      
      try {
        await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify({ action: 'delete', id: id })
        });
        // Esperamos un segundo para que se procese en Google
        setTimeout(fetchData, 1000);
      } catch(e) {
        alert("Error al eliminar");
      }
    }

    function render() {
      const mKey = viewDate.getFullYear() + '-' + String(viewDate.getMonth() + 1).padStart(2, '0');
      document.getElementById('current-month-label').innerText = viewDate.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });

      let totalMes = 0, activosMes = 0, deudaRestante = 0;
      const hoyKey = new Date().toISOString().substring(0, 7);
      const listContainer = document.getElementById('expenses-list');
      listContainer.innerHTML = "";

      if (allExpenses.length > 0) {
        allExpenses.forEach(g => {
          const monto = parseFloat(g.monto);
          const cuotas = parseInt(g.cuotas);
          const [y, m] = g.fecha_inicio.split('-').map(Number);
          const cuotaValor = monto / cuotas;
          
          for(let i=0; i<cuotas; i++) {
            const d = new Date(y, m-1+i, 1);
            const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2, '0');
            
            if (k === mKey) {
              totalMes += cuotaValor;
              if (cuotas > 1) activosMes++;
              listContainer.innerHTML += `
                <div class="bg-[#0f1419] p-4 rounded-xl border border-white/5 flex justify-between items-center group">
                  <div class="flex items-center gap-4">
                    <button onclick="eliminarGasto(${g.id})" class="text-gray-600 hover:text-red-500 transition-colors">
                      <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <div>
                      <div class="text-sm font-semibold">${g.descripcion}</div>
                      <div class="text-[10px] text-[#9ca9b8] uppercase">${cuotas > 1 ? `Cuota ${i+1}/${cuotas}` : 'Pago único'}</div>
                    </div>
                  </div>
                  <div class="text-right font-bold text-[#ff6b35] text-lg">$${cuotaValor.toFixed(2)}</div>
                </div>`;
            }
            if (k >= hoyKey) deudaRestante += cuotaValor;
          }
        });
      }

      if(listContainer.innerHTML === "") {
        listContainer.innerHTML = `<div class="text-center py-10 opacity-20 italic">Sin movimientos este mes</div>`;
      }

      document.getElementById('month-total').innerText = `$${totalMes.toFixed(2)}`;
      document.getElementById('active-installments').innerText = activosMes;
      document.getElementById('remaining-debt').innerText = `$${deudaRestante.toFixed(2)}`;
      lucide.createIcons();
    }

    document.getElementById('expense-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerText = "Sincronizando...";

      const data = {
        descripcion: document.getElementById('desc').value,
        monto: parseFloat(document.getElementById('amount').value),
        cuotas: parseInt(document.getElementById('installments').value),
        fecha_inicio: document.getElementById('start-date').value,
        categoria: document.getElementById('category').value
      };

      try {
        await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(data)
        });
        
        e.target.reset();
        document.getElementById('start-date').value = new Date().toISOString().substring(0, 7);
        setTimeout(fetchData, 1500);
      } catch (err) {
        alert("Error al guardar");
      } finally {
        btn.disabled = false;
        btn.innerText = "Guardar en la Nube";
      }
    };

    document.getElementById('prev-month').onclick = () => { viewDate.setMonth(viewDate.getMonth()-1); render(); };
    document.getElementById('next-month').onclick = () => { viewDate.setMonth(viewDate.getMonth()+1); render(); };
    document.getElementById('today-btn').onclick = () => { viewDate = new Date(); viewDate.setDate(1); render(); };
    document.getElementById('start-date').value = new Date().toISOString().substring(0, 7);

    fetchData();
  </script>
</body>
</html>
